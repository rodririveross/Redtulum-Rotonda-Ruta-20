<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paradas RedTulum - Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  #header {
    background: #ffffff;
    border-bottom: 1px solid #e2e2e2;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #header h1 {
    font-size: 16px;
    margin: 0;
    color: #1a1a1a;
    font-weight: 700;
    white-space: nowrap;
  }
  #search {
    width: 200px;
    flex: 0 0 auto;
    padding: 7px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  #lineFilter {
    padding: 7px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    background: #fff;
  }
  #counter {
    font-size: 12px;
    color: #666;
    white-space: nowrap;
  }
  #map {
    flex: 1;
    background: #ffffff;
  }
  .leaflet-container {
    background: #ffffff !important;
  }
  .stop-popup {
    font-size: 13px;
    min-width: 180px;
  }
  .stop-popup .stop-name {
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
    font-size: 14px;
  }
  .stop-popup .stop-id {
    color: #888;
    font-size: 11px;
    margin-bottom: 6px;
  }
  .stop-popup .lines-label {
    font-size: 11px;
    color: #555;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .lines-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .line-chip {
    background: #0b6efd;
    color: #fff;
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .stop-icon {
    width: 26px;
    height: 34px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.45));
  }
  #logo {
    height: 64px;
    width: auto;
    display: block;
  }
  #subtitle {
    background: #ffffff;
    border-bottom: 1px solid #e2e2e2;
    padding: 8px 16px;
    text-align: center;
    font-weight: 700;
    text-decoration: underline;
    font-size: 15px;
    color: #1a1a1a;
  }
</style>
</head>

function buildPopup(stop) {
  const chips = stop.lines.map(l => `<span class="line-chip">${l}</span>`).join('');
  return `<div class="stop-popup">
    <div class="stop-name">${stop.name}</div>
    <div class="stop-id">ID: ${stop.id}</div>
    <div class="lines-label">Líneas que pasan (${stop.lines.length}):</div>
    <div class="lines-list">${chips}</div>
  </div>`;
}

function renderMarkers(filtered) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  filtered.forEach(stop => {
    const marker = L.marker([stop.lat, stop.lon], { icon: makeIcon() });
    marker.bindPopup(buildPopup(stop));
    marker.addTo(map);
    markers.push(marker);
  });
  document.getElementById('counter').textContent = filtered.length + ' de ' + STOPS.length + ' paradas';
}

function applyFilters() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const lineSel = lineFilterEl.value;
  const filtered = STOPS.filter(stop => {
    const matchesQuery = !query || stop.name.toLowerCase().includes(query) || stop.id.includes(query);
    const matchesLine = !lineSel || stop.lines.includes(lineSel);
    return matchesQuery && matchesLine;
  });
  renderMarkers(filtered);
}

document.getElementById('search').addEventListener('input', applyFilters);
lineFilterEl.addEventListener('change', applyFilters);

renderMarkers(STOPS);

if (STOPS.length > 0) {
  const bounds = L.latLngBounds(STOPS.map(s => [s.lat, s.lon]));
  map.fitBounds(bounds, { padding: [40, 40] });
}
